# gototerm 設定例（日本語・半透明・Ghostty 風）
# -----------------------------------------------------------------------------
# このファイルを ~/.config/gototerm/config.toml にコピーして使ってください。
#   mkdir -p ~/.config/gototerm
#   cp config.example.toml ~/.config/gototerm/config.toml
#
# 書いた項目だけがデフォルト値を上書きします（全項目は src/config.rs を参照）。
# 色は RRGGBBAA 形式。末尾2桁がアルファ（FF=不透明 〜 00=完全透明）。
# -----------------------------------------------------------------------------

# フォント（先頭=主フォント、2番目以降=フォールバック）
# 英数字・アイコン用に等幅フォント、日本語用に Noto Sans CJK JP を併用する。
# これらに無いグリフは、埋め込みの M PLUS 1 Code が最終フォールバックになる。
#
# ※パスはディストリによって異なる。自分の環境の実体を確認して書き換えること:
#     fc-match -f '%{file}\n' 'JetBrainsMono Nerd Font'
#     fc-match -f '%{file}\n' 'Noto Sans CJK JP'
fonts_regular = [
    "/usr/share/fonts/TTF/JetBrainsMonoNerdFont-Regular.ttf",
    "/usr/share/fonts/noto-cjk/NotoSansCJK-Regular.ttc",
]
fonts_bold = [
    "/usr/share/fonts/TTF/JetBrainsMonoNerdFont-Bold.ttf",
    "/usr/share/fonts/noto-cjk/NotoSansCJK-Bold.ttc",
]
fonts_faint = [
    "/usr/share/fonts/TTF/JetBrainsMonoNerdFont-Regular.ttf",
    "/usr/share/fonts/noto-cjk/NotoSansCJK-Regular.ttc",
]

# 文字サイズ（ピクセル）。ディスプレイのスケールに応じて調整する。
# 起動後に Ctrl+= / Ctrl+- でライブ調整も可能。
font_size = 17

# ワークベンチ左サイドバーの幅比率。Ctrl+Shift+F で表示したときだけ使われます。
sidebar_ratio = 0.25

# ワークベンチ右側の上下分割比（上=プレビュー）。
preview_ratio = 0.50

# サイドバーの changed files 監視で無視するパス構成要素。
# 例: ["target"] は target/foo.o と crates/app/target/foo.o の両方を無視します。
watch_ignore = [".git", "node_modules", "target", "dist", "__pycache__"]

# [編集] で使うエディタ。空なら $EDITOR → nvim の順で決まる。
# 例: editor = ["nvim"] / ["vim"] / ["micro"] / ["helix"]
# VSCode 等の GUI エディタ派は editor を設定せず
# [OSの既定アプリで開く] を使うのが簡単（既定アプリの関連付けに従う）。
# editor = ["nvim"]

# 配色は既定で Tokyo Night（Night バリアント）。背景だけ透過を上書きする例。
# 1A1B26 = Tokyo Night の背景色。末尾2桁 = アルファ（不透明度）。
# CC = 204/255 = 0.80（80%不透明＝20%透過）。コンポジタ側のブラーと併用すると綺麗。
# 完全不透明にするなら末尾を FF（0x1A1B26FF）にする。
color_background = 0x1A1B26CC
