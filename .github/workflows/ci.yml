name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfreetype6-dev \
            libfontconfig1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # FreeType を cmake でソースビルドするため MSVC 開発環境(vcvars)を読み込む。
      # これが無いと cmake が「couldn't determine visual studio generator」で失敗する。
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test
