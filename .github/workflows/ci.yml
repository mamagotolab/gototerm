name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfreetype6-dev \
            libfontconfig1-dev \
            libwayland-dev \
            libxkbcommon-dev \
            cmake

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test

  build-windows:
    runs-on: windows-latest
    env:
      # cmake クレートは新しい Visual Studio(18=2026相当)の generator 名を知らず
      # 自動判定に失敗する。Ninja を明示すれば VS バージョン非依存でビルドできる。
      CMAKE_GENERATOR: Ninja
      # 同梱 FreeType の CMakeLists が古い cmake_minimum_required を宣言しており、
      # 新しい CMake(4.x) が互換ポリシー不足で拒否する。最小ポリシーを指定して許可する。
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
    steps:
      - uses: actions/checkout@v4

      # FreeType を cmake でソースビルドするため MSVC 開発環境(vcvars)を読み込む。
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test
